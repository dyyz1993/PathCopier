<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- 白色背景 -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="#ffffff"/>

  <!-- 简笔画剪贴板 — 细黑线外框 -->
  <rect x="262" y="280" width="500" height="580" rx="32" ry="32"
        fill="none" stroke="#000000" stroke-width="32" stroke-linejoin="round"/>

  <!-- 夹子 -->
  <rect x="430" y="240" width="164" height="90" rx="18" ry="18"
        fill="none" stroke="#000000" stroke-width="28" stroke-linejoin="round"/>

  <!-- 夹子中间的缝 -->
  <line x1="460" y1="280" x2="564" y2="280" stroke="#ffffff" stroke-width="30" stroke-linecap="round"/>

  <!-- 路径文字线条 — 三条横线代表路径 -->
  <line x1="340" y1="500" x2="450" y2="500" stroke="#000000" stroke-width="24" stroke-linecap="round"/>
  <line x1="340" y1="580" x2="550" y2="580" stroke="#000000" stroke-width="24" stroke-linecap="round"/>
  <line x1="340" y1="660" x2="400" y2="660" stroke="#000000" stroke-width="28" stroke-linecap="round"/>

  <!-- 路径上的小箭头指示符 -->
  <polyline points="680,500 720,540 680,580"
            fill="none" stroke="#000000" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="320" y1="500" x2="680" y2="500" stroke="#000000" stroke-width="8" stroke-dasharray="16,16"
        stroke-linecap="round"/>
</svg>
